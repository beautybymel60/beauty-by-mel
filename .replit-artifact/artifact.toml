kind = "web"
previewPath = "/"
title = "Beauty by Mel"
version = "1.0.0"
id = "artifacts/beauty-by-mel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23294

[services.development]
run = "pnpm --filter @workspace/beauty-by-mel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beauty-by-mel", "run", "build" ]
publicDir = "artifacts/beauty-by-mel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23294"
BASE_PATH = "/"
